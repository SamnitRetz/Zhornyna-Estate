<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чайна плантація Жорнина | Zhornyna Estate</title>
    <meta name="description" content="Zhornyna Estate — перша та едина чайна плантація України. Мукачево, Закарпаття.">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

    <style>
        /* Обнулення відступів */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            overflow: hidden; /* Заглушка без прокрутки */
        }

        /* Налаштування фону */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Градієнт став прозорішим (0.65), щоб було видно малюнок */
            background-image: linear-gradient(rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0.8)), url('bg.jpg');
            background-size: cover;
            background-position: bottom center; /* Кущі чаю будуть внизу екрана */
            background-repeat: no-repeat;
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
            background: transparent;
        }

        /* Захист логотипа */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
            max-width: 400px;
            width: 85%;
            user-select: none;
        }

        .logo-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none; /* Не можна перетягнути мишкою */
            -webkit-user-drag: none;
        }

        /* Невидимий щит від правої кнопки миші */
        .shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 5vw, 2.8rem);
            color: #2d5a27; /* Колір під логотип */
            margin-bottom: 50px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-shadow: 0 0 15px rgba(255,255,255,0.5); /* Покращує читабельність на фоні */
        }

        /* Соцмережі */
        .social-links {
            display: flex;
            gap: 30px;
            z-index: 20;
        }

        .social-links a {
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0.9;
            display: inline-block;
        }

        .social-links a:hover {
            transform: translateY(-5px);
            opacity: 1;
        }

        .social-links svg {
            width: 32px;
            height: 32px;
            fill: #2d5a27;
        }

        /* Адаптація для мобільних */
        @media (max-width: 480px) {
            h1 { margin-bottom: 40px; }
            .social-links { gap: 25px; }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <main class="container">
        
        <div class="logo-wrapper" oncontextmenu="return false;">
            <img src="logo.png" alt="Zhornyna Tea Plantation Logo">

        <h1>Чайна плантація Жорнина</h1>
